<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoderMon</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">LOGOOO</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 mx-auto">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"
                  >Inicio</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  data-bs-toggle="modal"
                  data-bs-target="#creadorModal"
                  >Creador</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  data-bs-toggle="modal"
                  data-bs-target="#tuCreacionModal"
                  >Tus creaciones
                  <span style="color: green" id="limiteCreacionMochila"
                    >(0)</span
                  ></a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  data-bs-toggle="modal"
                  data-bs-target="#exampleModal"
                  >Mochila
                  <span style="color: green" id="limiteMochila">(0)</span></a
                >
              </li>
            </ul>
            <form class="d-flex" role="search" id="formularioBusqueda">
              <input
                class="form-control flex-grow-1 me-2"
                type="text"
                placeholder="Buscar, ej: pikachu, charmander"
                aria-label="Search"
                id="inputBuscar"
              />
              <button class="btn btn-outline-danger flex-grow-1" type="submit">
                Pokedex
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main class="container-fluid">
      <section>
        <div
          class="row row-cols-1 row-cols-md-3 row-cols-lg-4 m-5 shadow-lg"
          id="contenedorPokemon"
        ></div>
      </section>
      <!-- Paginacion -->
      <section>
        <div aria-label="Page navigation example">
          <ul class="pagination justify-content-center">
            <li class="page-item">
              <!-- disabled -->
              <a class="page-link" href="#" id="anteriorPaginacion"
                >◀ Página anterior</a
              >
            </li>
            <li class="page-item">
              <a class="page-link" href="#" id="siguientePaginacion"
                >Página siguiente ▶</a
              >
            </li>
          </ul>
        </div>
      </section>
    </main>
    <footer class="bg-light container-fluid text-center mt-5 p-4">
      <p style="display: inline">Este es el contenido del footer.</p>
    </footer>
    <!-- modals -->
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">🎒 Mochila</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body text-center" id="mochilaPokemon"></div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-primary w-100"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
            <button
              type="button"
              class="btn btn-danger w-100"
              id="vaciarMochilaButton"
            >
              Vaciar mochila
            </button>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="creadorModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">
              ⚙ Crea tu Pokeamigo
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body text-center" id="creadorPokemon">
            <form id="formularioCreador">
              <div class="form-group mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="nombre"
                  placeholder="Nombre"
                />
              </div>
              <div class="form-group mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="tipo"
                  placeholder="Tipo"
                />
              </div>
              <div class="input-group mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="imagen"
                  placeholder="Imagen"
                />
                <span class="input-group-text">
                  <a
                    href="javascript:void(0)"
                    class="w-100"
                    data-bs-toggle="popover"
                    data-bs-content="Para subir la imagen de tu PokeCreación, debes utilizar un servidor externo como https://postimages.org/es/. Una vez dentro, sigue estos pasos:
                    1 - Configura las opciones de tamaño.
                    2 - Configura la opción de expiración.
                    3 - Elige la imagen de tu PC.
                    4 - Una vez subida, copia la opción de 'ENLACE DIRECTO' y pégala aquí."
                    data-bs-placement="right"
                    >❓</a
                  >
                </span>
              </div>
              <div class="form-group mb-3">
                <button type="submit" class="btn btn-primary w-100">
                  Crear
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="tuCreacionModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">
              💖 Tus creaciones
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body text-center" id="listarPokeAmigos"></div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-primary w-100"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
            <button
              type="button"
              class="btn btn-danger w-100"
              data-bs-dismiss="modal"
              id="vaciarCreadorButton"
            >
              Vaciar creador
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="editarModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">🛠 Edita tu Pokeamigo</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center" id="editorPokemon">
            <form id="formularioEditor"></form>
          </div>
        </div>
      </div>
    </div>
    <!-- libs -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
      crossorigin="anonymous"
    ></script>
    <!-- popover de BT -->
    <script>
      const popoverTriggerList = [].slice.call(
        document.querySelectorAll('[data-bs-toggle="popover"]')
      );
      const popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
        return new bootstrap.Popover(popoverTriggerEl);
      });
    </script>
    <!-- mi script -->
    <script src="js/main.js"></script>
  </body>
</html>
